<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:,">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download Files</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: #111;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #ebebeb;
      padding: 0.875rem 2rem;
    }
    header h1 { margin: 0; font-size: 1rem; font-weight: 600; color: #111; letter-spacing: -0.01em; display: flex; align-items: center; gap: 0.5rem; }
    main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      margin-bottom: 1.5rem;
    }
    nav.breadcrumb {
      font-size: 0.875rem;
      color: #666;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem;
      min-height: 1.5rem;
      flex: 1;
    }
    nav.breadcrumb a { color: #0066cc; text-decoration: none; }
    nav.breadcrumb a:hover { text-decoration: underline; }
    nav.breadcrumb .sep { color: #d4d4d4; margin: 0 0.1rem; }
    nav.breadcrumb .current { color: #444; }
    .btn-dl-zip {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 0.3em;
      padding: 0.3rem 0.8rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #0066cc;
      background: transparent;
      border: 1px solid #d0d8e8;
      border-radius: 6px;
      text-decoration: none;
      white-space: nowrap;
      line-height: 1.6;
    }
    .btn-dl-zip:hover { background: #f0f6ff; border-color: #b8ccdf; }
    .file-table-wrap {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 1px solid #ebebeb; }
    th {
      text-align: left;
      padding: 0.65rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
    }
    td { padding: 0.7rem 1rem; border-bottom: 1px solid #f2f2f2; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8f9ff; }
    td.name a { color: #0066cc; text-decoration: none; font-weight: 500; }
    td.name a:hover { text-decoration: underline; }
    td.name .icon { display: inline-block; width: 1.1em; margin-right: 0.4em; text-align: center; opacity: 0.5; }
    td.size, td.modified { color: #777; font-size: 0.875rem; white-space: nowrap; }
    .status-row td {
      padding: 3rem 1rem;
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
    }
    .error-box {
      background: #fff8f8;
      border: 1px solid #f0cece;
      border-radius: 8px;
      padding: 2rem 1.5rem;
      text-align: center;
      color: #c00;
    }
    .error-box h2 { margin: 0 0 0.5rem; font-size: 1.05rem; }
    .error-box p { margin: 0; color: #666; font-size: 0.875rem; }
    .password-wrap {
      display: flex;
      justify-content: center;
      padding: 4rem 1rem;
    }
    .password-card {
      background: #fff;
      box-shadow: 0 2px 20px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      border-radius: 10px;
      padding: 2.25rem 2.5rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .password-card h2 {
      margin: 0 0 0.4rem;
      font-size: 1.05rem;
      font-weight: 600;
      color: #111;
      letter-spacing: -0.01em;
    }
    .password-card p {
      margin: 0 0 1.5rem;
      color: #777;
      font-size: 0.875rem;
      line-height: 1.5;
    }
    .password-card input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.875rem;
      font-size: 0.9375rem;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      outline: none;
      margin-bottom: 0.75rem;
      transition: border-color 0.15s;
    }
    .password-card input[type="password"]:focus { border-color: #0066cc; box-shadow: 0 0 0 3px rgba(0,102,204,0.12); }
    .password-card button {
      width: 100%;
      padding: 0.65rem 1rem;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: #0066cc;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .password-card button:hover { background: #0055aa; }
    .password-card button:disabled { background: #a0c0e8; cursor: default; }
    .password-error {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #cc3333;
    }
    @media (max-width: 600px) {
      th.size, td.size, th.modified, td.modified { display: none; }
      header { padding: 0.875rem 1rem; }
      main { padding: 1.5rem 1rem; }
    }
  </style>
</head>
<body>
<header>
  <h1><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0"><circle cx="15.5" cy="4" r="2.5" fill="#0066cc"/><circle cx="4.5" cy="10" r="2.5" fill="#0066cc"/><circle cx="15.5" cy="16" r="2.5" fill="#0066cc"/><line x1="6.8" y1="8.9" x2="13.2" y2="5.1" stroke="#0066cc" stroke-width="1.5" stroke-linecap="round"/><line x1="6.8" y1="11.1" x2="13.2" y2="14.9" stroke="#0066cc" stroke-width="1.5" stroke-linecap="round"/></svg>Download Files</h1>
</header>
<main>
  {{if .Error}}
  <div class="error-box">
    <h2>{{.Error.Title}}</h2>
    <p>{{.Error.Detail}}</p>
  </div>
  {{else}}
  <div id="password-section"{{if not .IsPasswordProtected}} style="display:none"{{end}}>
    <div class="password-wrap">
      <div class="password-card">
        <h2>Password Required</h2>
        <p>This share is password-protected. Enter the password to continue.</p>
        <input type="password" id="share-password" placeholder="Password" autocomplete="current-password"{{if .IsPasswordProtected}} autofocus{{end}}>
        <button id="unlock-btn">Unlock</button>
        <p id="password-error" class="password-error" hidden></p>
      </div>
    </div>
  </div>
  <div id="browse-section"{{if .IsPasswordProtected}} style="display:none"{{end}}>
    <div class="toolbar">
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <a id="dl-zip-btn" href="#" class="btn-dl-zip">&#8595; Download ZIP</a>
    </div>
    <div class="file-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th class="size">Size</th>
            <th class="modified">Modified</th>
          </tr>
        </thead>
        <tbody id="file-tbody">
          <tr class="status-row"><td colspan="3">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  {{end}}
</main>

{{if not .Error}}
<script>
(function () {
  'use strict';

  var sharingID = {{.SharingID | js}};
  var shareName = {{.ShareName | js}};

  var passwordSection = document.getElementById('password-section');
  var browseSection   = document.getElementById('browse-section');
  var tbody           = document.getElementById('file-tbody');
  var breadcrumb      = document.getElementById('breadcrumb');
  var dlZipBtn        = document.getElementById('dl-zip-btn');

  var currentPath = '/';

  // ── Password unlock ────────────────────────────────────────────────────────

  var input  = document.getElementById('share-password');
  var btn    = document.getElementById('unlock-btn');
  var errEl  = document.getElementById('password-error');

  function showPasswordError(msg) {
    errEl.textContent = msg;
    errEl.hidden = false;
  }

  function doUnlock() {
    var password = input.value;
    if (!password) { input.focus(); return; }

    btn.disabled = true;
    errEl.hidden = true;

    fetch('/api/sharing/unlock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: sharingID, password: password })
    })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.success) {
          if (data.isUpload) {
            // Upload shares are server-rendered; a reload is needed.
            window.location.reload();
            return;
          }
          shareName = data.shareName || '';
          passwordSection.style.display = 'none';
          browseSection.style.display = '';
          navigate('/');
        } else {
          showPasswordError(data.error || 'Unlock failed.');
          btn.disabled = false;
          input.select();
        }
      })
      .catch(function () {
        showPasswordError('Network error — could not reach the server.');
        btn.disabled = false;
      });
  }

  if (btn) {
    btn.addEventListener('click', doUnlock);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') { doUnlock(); }
    });
  }

  // ── File browser ───────────────────────────────────────────────────────────

  function updateDownloadBtn(folderPath) {
    dlZipBtn.href = '/api/sharing/download-folder'
      + '?id='   + encodeURIComponent(sharingID)
      + '&path=' + encodeURIComponent(folderPath);
  }

  function navigate(newPath) {
    currentPath = newPath;
    updateDownloadBtn(newPath);
    loadFiles(newPath);
  }

  function loadFiles(folderPath) {
    tbody.innerHTML = '<tr class="status-row"><td colspan="3">Loading…</td></tr>';
    renderBreadcrumb(folderPath);

    var url = '/api/sharing/list'
      + '?id='   + encodeURIComponent(sharingID)
      + '&path=' + encodeURIComponent(folderPath);

    fetch(url)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!data.success) {
          showListError(data.error || 'Failed to load files.');
          return;
        }
        renderFiles(data.files || []);
      })
      .catch(function () { showListError('Network error — could not reach the server.'); });
  }

  function renderFiles(files) {
    if (files.length === 0) {
      tbody.innerHTML = '<tr class="status-row"><td colspan="3">This folder is empty.</td></tr>';
      return;
    }

    var html = '';
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      var nameCell;
      if (f.is_dir) {
        nameCell = '<a href="#" data-path="' + escAttr(f.path) + '">'
          + '<span class="icon">&#128193;</span>' + escHTML(f.name) + '</a>';
      } else {
        var dlURL = '/api/sharing/download'
          + '?id='   + encodeURIComponent(sharingID)
          + '&path=' + encodeURIComponent(f.path);
        nameCell = '<a href="' + escAttr(dlURL) + '" download="' + escAttr(f.name) + '">'
          + '<span class="icon">&#128196;</span>' + escHTML(f.name) + '</a>';
      }
      html += '<tr>'
        + '<td class="name">' + nameCell + '</td>'
        + '<td class="size">'     + (f.is_dir ? '&mdash;' : escHTML(f.size_human)) + '</td>'
        + '<td class="modified">' + escHTML(f.mtime) + '</td>'
        + '</tr>';
    }
    tbody.innerHTML = html;

    var links = tbody.querySelectorAll('a[data-path]');
    for (var j = 0; j < links.length; j++) {
      links[j].addEventListener('click', function (e) {
        e.preventDefault();
        navigate(this.getAttribute('data-path'));
      });
    }
  }

  function renderBreadcrumb(folderPath) {
    var rel = folderPath.replace(/^\//, '');
    var parts = rel ? rel.split('/') : [];

    var html = '';
    if (parts.length === 0) {
      html += '<span class="current">' + escHTML(shareName) + '</span>';
    } else {
      html += '<a href="#" data-nav="/">' + escHTML(shareName) + '</a>'
           + '<span class="sep">/</span>';
      for (var i = 0; i < parts.length; i++) {
        var accum = '/' + parts.slice(0, i + 1).join('/');
        if (i === parts.length - 1) {
          html += '<span class="current">' + escHTML(parts[i]) + '</span>';
        } else {
          html += '<a href="#" data-nav="' + escAttr(accum) + '">' + escHTML(parts[i]) + '</a>'
               + '<span class="sep">/</span>';
        }
      }
    }
    breadcrumb.innerHTML = html;

    var navLinks = breadcrumb.querySelectorAll('a[data-nav]');
    for (var j = 0; j < navLinks.length; j++) {
      navLinks[j].addEventListener('click', function (e) {
        e.preventDefault();
        navigate(this.getAttribute('data-nav'));
      });
    }
  }

  function showListError(msg) {
    tbody.innerHTML = '<tr class="status-row"><td colspan="3">' + escHTML(msg) + '</td></tr>';
  }

  function escHTML(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escAttr(s) { return escHTML(s); }

  // Start loading immediately for non-password shares.
  if (browseSection.style.display !== 'none') {
    navigate('/');
  }
})();
</script>
{{end}}
</body>
</html>
